[build]
  # No build step needed — pure static HTML/CSS/JS
  publish = "12-v3.2-hero-video"

[build.environment]
  NODE_VERSION = "20"

# Cache-Control: long-cache for assets, short for HTML
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/module-ui/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
